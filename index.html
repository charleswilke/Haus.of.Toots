<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Haus of Toots - Custom Needlepoint Canvases</title>
    <meta name="description" content="Custom needlepoint canvases, hand-drawn by Jessie Wilke.">
    <meta property="og:title" content="Haus of Toots - Custom Needlepoint Canvases">
    <meta property="og:description" content="Custom needlepoint canvases, hand-drawn by Jessie Wilke.">
    <meta property="og:image" content="https://hausoftoots.com/images/wordmarklogo.png">
    <meta property="og:url" content="https://hausoftoots.com/">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Haus of Toots - Custom Needlepoint Canvases">
    <meta name="twitter:description" content="Custom needlepoint canvases, hand-drawn by Jessie Wilke.">
    <meta name="twitter:image" content="https://hausoftoots.com/images/wordmarklogo.png">
    <link rel="canonical" href="https://hausoftoots.com/">
    <link rel="icon" type="image/png" href="images/favicon.png">
    <link rel="preload" href="images/haus_of_toots_canvas_13ct_512px.png" as="image">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chewy&family=Winky+Sans:wght@300&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="shop-styles.css">
</head>
<body>
    <div id="shared-nav"></div>
    <div id="shared-stitch-sidebar"></div>
    <div id="shared-cursor-canvas"></div>
    <script src="shared-components.js"></script>

    <!-- Hero Section -->
    <section class="hero">
        <div class="container">
            <div class="hero-layout">
                <div class="hero-logo-side">
                    <img src="images/wordmarklogo.png" alt="Haus of Toots" class="hero-logo" id="hausLogo" width="328" height="437">
                </div>
                <div class="hero-content-side">
                    <div class="stitched-border">
                        <div class="hero-content">
                            <div class="hero-photo-mobile">
                                <div class="embroidery-hoop hero-hoop hero-hoop-mobile">
                                    <div class="hoop-ring hero-hoop-ring"></div>
                                    <div class="canvas-placeholder">
                                        <img src="images/jessiebio.jpg" alt="Jessie Wilke" class="bio-photo" width="700" height="525">
                                    </div>
                                </div>
                            </div>
                            <div class="hero-text-mobile">
                                <h2 class="hero-title">Hi, I'm <span class="highlight">Jessie!</span></h2>
                                <p class="hero-description"> I paint cute, weird, and wildly specific custom needlepoint canvases!</p>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="hero-photo-side">
                    <div class="embroidery-hoop hero-hoop">
                        <div class="hoop-ring hero-hoop-ring"></div>
                        <div class="canvas-placeholder">
                            <img src="images/jessiebio.jpg" alt="Jessie Wilke" class="bio-photo" width="700" height="525">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Shop Section -->
    <section class="shop-section">
        <div class="container">
            <div id="loadingState" class="loading-state">
                <div class="loading-spinner"></div>
                <p>Loading products...</p>
            </div>

            <div id="errorState" class="error-state" style="display: none;">
                <p>Oops! Unable to load products. Please try again later.</p>
            </div>

            <div id="productsGrid" class="products-grid" style="display: none;">
                <!-- Products will be inserted here by JavaScript -->
            </div>
        </div>
    </section>

    <!-- Product Detail Modal -->
    <div id="productModal" class="product-modal">
        <div class="product-modal-overlay"></div>
        <div class="product-modal-content">
            <button id="closeProductModal" class="close-product-modal" aria-label="Close product details">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
            <div id="productModalBody" class="product-modal-body">
                <!-- Product details will be loaded here -->
            </div>
            <div id="productModalScrollbar" class="product-modal-scrollbar hidden" aria-hidden="true">
                <div class="product-modal-scrollbar-track"></div>
                <div id="productModalScrollbarThumb" class="product-modal-scrollbar-thumb"></div>
            </div>
        </div>
    </div>

    <!-- Image Lightbox -->
    <div id="imageLightbox" class="image-lightbox">
        <div class="lightbox-overlay"></div>
        <button id="closeLightbox" class="lightbox-close" aria-label="Close lightbox">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
        </button>
        <button id="prevImage" class="lightbox-nav lightbox-prev" aria-label="Previous image">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="15 18 9 12 15 6"></polyline>
            </svg>
        </button>
        <button id="nextImage" class="lightbox-nav lightbox-next" aria-label="Next image">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="9 18 15 12 9 6"></polyline>
            </svg>
        </button>
        <div class="lightbox-content">
            <img id="lightboxImage" src="" alt="" class="lightbox-image">
            <div id="lightboxCaption" class="lightbox-caption"></div>
        </div>
    </div>

    <div id="shared-footer"></div>
    <div id="shared-cart-drawer"></div>
    <script>SharedComponents.injectAll();</script>

    <script src="shopify-config.js"></script>
    <script src="shopify.js"></script>
    <script src="gallery-data.js"></script>
    <script src="shop-app.js"></script>
    <script src="script.js"></script>
</body>
</html>
