name: Deploy to DreamHost

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Allows manual trigger from Actions tab

jobs:
  deploy:
    name: Deploy to DreamHost via SFTP
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Verify .htaccess exists
        run: |
          if [ -f .htaccess ]; then
            echo ".htaccess file found"
            cat .htaccess
          else
            echo "ERROR: .htaccess file not found!"
            exit 1
          fi

      - name: Stamp asset version into HTML
        run: |
          export ASSET_VERSION="${GITHUB_SHA::7}"
          echo "Using asset version: ${ASSET_VERSION}"
          python - <<'PY'
          import os
          from pathlib import Path

          version = os.environ["ASSET_VERSION"]

          for path in Path(".").glob("*.html"):
              content = path.read_text(encoding="utf-8")
              if "__ASSET_VERSION__" not in content:
                  continue
              path.write_text(
                  content.replace("__ASSET_VERSION__", version),
                  encoding="utf-8"
              )
          PY
        
      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy to DreamHost via SFTP
        env:
          SFTP_SERVER: ${{ secrets.SFTP_SERVER }}
          SFTP_USERNAME: ${{ secrets.SFTP_USERNAME }}
          SFTP_PASSWORD: ${{ secrets.SFTP_PASSWORD }}
        run: |
          lftp -u "$SFTP_USERNAME","$SFTP_PASSWORD" "sftp://$SFTP_SERVER" <<'EOF'
          set sftp:auto-confirm yes
          set net:max-retries 2
          set net:reconnect-interval-base 5
          set net:timeout 20
          mirror --reverse --verbose \
            --exclude-glob .git/ \
            --exclude-glob .github/ \
            --exclude-glob node_modules/ \
            --exclude-glob *.code-workspace \
            --exclude-glob .DS_Store \
            ./ /home/jessieToots/hausoftoots.com/
          bye
          EOF
